<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#1a6fb5"/>

  <!-- Sun rays -->
  <g stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round">
    <line x1="16" y1="5"  x2="16" y2="3"/>
    <line x1="21.5" y1="7"  x2="22.7" y2="5.7"/>
    <line x1="24" y1="12" x2="26" y2="11"/>
    <line x1="10.5" y1="7"  x2="9.3"  y2="5.7"/>
    <line x1="8"  y1="12" x2="6"  y2="11"/>
  </g>

  <!-- Sun -->
  <circle cx="16" cy="12" r="4" fill="#fbbf24"/>

  <!-- Cloud -->
  <ellipse cx="14" cy="21" rx="7" ry="4.5" fill="#fff"/>
  <ellipse cx="18" cy="19.5" rx="5" ry="4" fill="#fff"/>
  <ellipse cx="11" cy="20" rx="4" ry="3.5" fill="#fff"/>
  <rect x="7" y="20" width="16" height="4" rx="2" fill="#fff"/>
</svg>
