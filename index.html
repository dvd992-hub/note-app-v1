<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes</title>

  <!-- ── Favicon ─────────────────────────────────────────────────
       SVG favicon: modern browsers (Chrome 80+, Firefox 83+, Safari 15+).
       ICO  favicon: fallback for older browsers and Windows taskbar.
       Both reference the same visual; ICO contains 16×16, 32×32, 48×48.
  ──────────────────────────────────────────────────────────────── -->
  <link rel="icon"     type="image/svg+xml" href="assets/favicon/favicon.svg">
  <link rel="icon"     type="image/x-icon"  href="assets/favicon/favicon.ico" sizes="16x16 32x32 48x48">
  <link rel="shortcut icon"                 href="assets/favicon/favicon.ico">

  <!-- Google Fonts — preconnect reduces DNS + TLS latency -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ══════════════════════════════════════════════════════════════
       SIDEBAR — note list, search bar, language toggle, new-note btn
       Desktop: fixed left column.
       Mobile:  off-canvas drawer (slides in via .open class).
  ══════════════════════════════════════════════════════════════ -->
  <aside id="sidebar">

    <!-- Sidebar header: app title + language toggle + new-note button -->
    <div class="sidebar-head">

      <!-- App title; text updated by i18n.js -->
      <span class="app-title" data-i18n="appTitle">Notes</span>

      <!-- Language toggle pill ─────────────────────────────────────
           Auto-detect on first load (navigator.language).
           Manual override persisted in localStorage under "notes_lang".
           data-lang is read by app.js to call i18n.setLocale().
      ──────────────────────────────────────────────────────────── -->
      <div class="lang-toggle" role="group" aria-label="Language">
        <button class="lang-btn" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="it">IT</button>
      </div>

      <!-- New note button (desktop sidebar) -->
      <button id="btn-new" data-i18n-title="newNote" title="New note (Ctrl+N)">＋</button>

    </div>

    <!-- Live search input -->
    <div class="search-wrap">
      <input
        id="search-input"
        type="search"
        data-i18n-placeholder="searchPlaceholder"
        placeholder="Search…"
        autocomplete="off"
      >
    </div>

    <!-- Note list — items generated dynamically by renderList() in app.js -->
    <div id="notes-list" role="list" aria-label="Notes"></div>

    <!-- Shown by JS when search returns no results -->
    <div id="empty-list" aria-live="polite" data-i18n="emptyList">No notes found.</div>

  </aside>


  <!-- Semi-transparent backdrop — closes the mobile sidebar on tap -->
  <div id="overlay" role="presentation"></div>


  <!-- ══════════════════════════════════════════════════════════════
       MAIN — primary content area
       Contains: mobile topbar, empty-state placeholder, editor.
  ══════════════════════════════════════════════════════════════ -->
  <main id="main">

    <!-- Mobile-only topbar: hamburger + title + new-note btn ──────
         Hidden on desktop via CSS; shown at ≤ 680 px.
    ──────────────────────────────────────────────────────────── -->
    <div id="topbar">
      <button id="btn-menu" data-i18n-title="openMenu" title="Open menu">
        <!-- Hamburger icon — inline SVG; no external dependency -->
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M3 5h14M3 10h14M3 15h14"
                stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>

      <span class="app-title" style="font-size:1.1rem" data-i18n="appTitle">Notes</span>

      <!-- New note button (mobile topbar) — styled inline to stay self-contained -->
      <button
        id="btn-new-mobile"
        data-i18n-title="newNote"
        title="New note"
        style="margin-left:auto;background:var(--accent);color:#fff;border:none;
               border-radius:8px;width:30px;height:30px;font-size:1.2rem;
               cursor:pointer;display:flex;align-items:center;justify-content:center;"
      >＋</button>
    </div>


    <!-- Empty state — shown when no note is selected ─────────────
         Hidden by JS when a note is opened (openNote()).
    ──────────────────────────────────────────────────────────── -->
    <div id="placeholder" aria-hidden="true">
      <!-- Decorative note icon -->
      <svg width="56" height="56" viewBox="0 0 56 56" fill="none">
        <rect x="8" y="10" width="40" height="36" rx="4"
              stroke="currentColor" stroke-width="2"/>
        <path d="M16 20h24M16 27h18M16 34h12"
              stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <p data-i18n="placeholderMsg">Select a note or create a new one</p>
    </div>


    <!-- ══════════════════════════════════════════════════════════
         EDITOR AREA — visible when a note is open
         Layout: toolbar → body → footer
    ══════════════════════════════════════════════════════════ -->
    <div id="editor-area">

      <!-- Formatting toolbar ───────────────────────────────────
           fmt-btn: data-fmt maps to document.execCommand() commands.
           tag-option: data-tag maps to CSS colour classes.
      ──────────────────────────────────────────────────────── -->
      <div class="editor-toolbar" role="toolbar" aria-label="Formatting">

        <!-- Group 1: inline text formatting -->
        <div class="toolbar-group">
          <button class="tb-btn fmt-btn" data-fmt="bold"
                  data-i18n-title="btnBold" title="Bold">
            <b data-i18n="btnBold">B</b>
          </button>
          <button class="tb-btn fmt-btn" data-fmt="italic"
                  data-i18n-title="btnItalic" title="Italic">
            <i data-i18n="btnItalic">I</i>
          </button>
          <button class="tb-btn fmt-btn" data-fmt="underline"
                  data-i18n-title="btnUnder" title="Underline">
            <u data-i18n="btnUnder">U</u>
          </button>
        </div>

        <div class="toolbar-sep" role="separator"></div>

        <!-- Group 2: lists -->
        <div class="toolbar-group">
          <button class="tb-btn fmt-btn" data-fmt="insertUnorderedList"
                  data-i18n="btnBullet">• List</button>
          <button class="tb-btn fmt-btn" data-fmt="insertOrderedList"
                  data-i18n="btnOrdered">1. Num</button>
        </div>

        <div class="toolbar-sep" role="separator"></div>

        <!-- Colour tag picker -->
        <div class="tag-picker">
          <span data-i18n="colorLabel">Color</span>
          <!-- data-tag values match CSS classes tag-a/b/c/d/none -->
          <div class="tag-option" data-tag="none" role="radio" aria-label="No colour" data-i18n-title="tagNone"></div>
          <div class="tag-option" data-tag="a"    role="radio" aria-label="Indigo"    data-i18n-title="tagA"></div>
          <div class="tag-option" data-tag="b"    role="radio" aria-label="Green"     data-i18n-title="tagB"></div>
          <div class="tag-option" data-tag="c"    role="radio" aria-label="Amber"     data-i18n-title="tagC"></div>
          <div class="tag-option" data-tag="d"    role="radio" aria-label="Pink"      data-i18n-title="tagD"></div>
        </div>

        <!-- Delete current note -->
        <button id="btn-delete" data-i18n-title="btnDelete" title="Delete note">
          🗑 <span data-i18n="btnDelete">Delete</span>
        </button>

      </div><!-- /editor-toolbar -->


      <!-- Editor body: title input + rich-text content area -->
      <div class="editor-body">

        <!-- Title: plain text input with serif font -->
        <input
          id="note-title-input"
          type="text"
          data-i18n-placeholder="titlePlaceholder"
          placeholder="Note title…"
          autocomplete="off"
          aria-label="Note title"
        >

        <!-- Content: contenteditable div for rich-text support.
             data-placeholder is read by the CSS ::before pseudo-element
             to render the placeholder text without extra JS. -->
        <div
          id="note-content-input"
          contenteditable="true"
          role="textbox"
          aria-multiline="true"
          aria-label="Note content"
          data-placeholder="Start writing…"
        ></div>

      </div><!-- /editor-body -->


      <!-- Footer: last-modified date + word count (populated by JS) -->
      <div class="editor-footer" aria-live="polite">
        <span id="footer-date"></span>
        <span id="footer-words"></span>
      </div>

    </div><!-- /editor-area -->

  </main><!-- /main -->


  <!-- ── Scripts ───────────────────────────────────────────────────
       i18n.js must load first — scripts.js calls i18n.init() and i18n.t()
       at initialisation time, so strings must be ready.
  ──────────────────────────────────────────────────────────────── -->
  <script src="js/i18n.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
